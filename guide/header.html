<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header Guide</title>
    <link rel="stylesheet" href="../assets/css/index.css" />
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <img src="../assets/images/orix_logo.png" alt="ORIX Capital" />
            </h1>
            <div class="contact-info">
                <p class="contact-text">고객센터</p>
                <div class="phone-info">
                    <span class="icon phone-icon">
                        <img src="../assets/images/phone-icon-header.svg" alt="Phone" />
                    </span>
                    <p class="phone-number">02-2050-6700</p>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
