<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width" />
    <title>Input Components</title>
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/guide/guide.css" />
</head>

<body>
    <div class="guide-container">
        <!-- === Text Input - Examples for States === -->
        <div class="guide-item">
            <h3>base input</h3>
            <div class="input-wrapper js-input-component" data-input-type="text">
                <p class="input-label">디폴트</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="text-input-label-default">기본 텍스트 입력 필드</p>
                </div>
                <div class="input-field-wrapper">
                    <input type="text" class="input-field" placeholder="이름을 입력해주세요"
                        aria-labelledby="text-input-label-default">
                </div>
            </div>
            <div class="input-wrapper is-disabled js-input-component" data-input-type="text">
                <p class="input-label">비활성</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="text-input-label-disabled">비활성화된 텍스트 입력 필드</p>
                </div>
                <div class="input-field-wrapper">
                    <input type="text" class="input-field" value="홍길동" disabled
                        aria-labelledby="text-input-label-disabled">
                </div>
            </div>
        </div>
        <!-- === Number Input - Examples for States === -->
        <div class="guide-item">
            <h3>number input</h3>
            <div class="input-wrapper js-input-component" data-input-type="number">
                <p class="input-label">전화번호</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="number-input-label-default">숫자 입력 필드 (기본)</p>
                </div>
                <div class="number-input-group">
                    <div class="number-input-select-wrapper">
                        <p>선택</p>
                        <span class="number-input-select-icon" aria-hidden="true" title="드롭다운 아이콘"></span>
                        <select>
                            <option value="option1">Option 1</option>
                            <option value="option2">Option 2</option>
                            <option value="option3">Option 3</option>
                        </select>
                    </div>
                    <div class="input-field-wrapper">
                        <input type="number" class="input-field" placeholder="1234"
                            aria-labelledby="number-input-label-default">
                    </div>
                </div>
            </div>
            <div class="input-wrapper is-disabled js-input-component" data-input-type="number">
                <p class="input-label">전화번호</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="number-input-label-default">숫자 입력 필드 (기본)</p>
                </div>
                <div class="number-input-group">
                    <div class="number-input-select-wrapper three-inputs">
                        <p>선택</p>
                        <span class="number-input-select-icon" aria-hidden="true" title="드롭다운 아이콘"></span>
                    </div>
                    <div class="input-field-wrapper ">
                        <input type="number" class="input-field" placeholder="1234"
                            aria-labelledby="number-input-label-default">
                    </div>
                    <div class="input-field-wrapper">
                        <input type="number" class="input-field" placeholder="1234"
                            aria-labelledby="number-input-label-default">
                    </div>
                </div>
            </div>
        </div>
        <!-- === Email Input - Examples for States === -->
        <div class="guide-item">
            <h3>Email Input Examples</h3>

            <!-- Default State -->
            <div class="input-wrapper js-input-component" data-input-type="email">

                <div class="email-input-holder">
                    <p class="input-label">디폴트</p>
                    <span class="email-input-ico" aria-hidden="true" title="정보 아이콘"></span>
                    <div class="input-label-wrapper">
                        <p class="sr-only" id="email-input-label-default">이메일 주소 입력 필드 (기본)</p>
                    </div>
                </div>
                <div class="email-input-group">
                    <div class="input-field-wrapper">
                        <input type="text" class="input-field" placeholder="abc123"
                            aria-labelledby="email-input-label-default">
                    </div>
                    <div class="email-at-separator">
                        <p class="sr-only">골뱅이</p>@
                    </div>
                    <div class="input-field-wrapper">
                        <input type="text" class="input-field" placeholder="naver.com"
                            aria-labelledby="email-input-label-default">
                    </div>
                </div>
                <div class="email-input-checkbox-wrapper">
                    <input type="checkbox" class="email-input-checkbox" id="email-default-checkbox">
                    <label for="email-default-checkbox" class="email-input-checkbox-label">
                        <p>Default Checkbox</p>
                    </label>
                </div>
            </div>
        </div>

        <!-- === Date Input - Examples for States === -->
        <div class="guide-item">
            <h3>Date Input Examples</h3>

            <!-- Default State -->
            <div class="input-wrapper js-input-component" data-input-type="date">
                <p class="input-label">디폴트</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="date-input-label-default">날짜 입력 필드 (기본)</p>
                </div>
                <div class="input-field-wrapper">
                    <input type="date" class="input-field date" placeholder="날짜를 입력해주세요"
                        aria-labelledby="date-input-label-default">
                    <span class="date-input-icon" aria-hidden="true" title="달력 아이콘"></span>
                </div>
            </div>
        </div>
        <!-- === Address Input - Examples for States === -->
        <div class="guide-item">
            <h3>Address Input Examples</h3>

            <!-- Default State -->
            <div class="input-wrapper js-input-component" data-input-type="address">
                <p class="input-label">디폴트</p>
                <div class="input-label-wrapper">
                    <p class="sr-only" id="address-input-label-default">주소 입력 필드 (기본)</p>
                </div>
                <div class="address-input-group">
                    <!-- Postcode and Search Button (Read-only initially) -->
                    <div class="address-postcode-group">
                        <div class="input-field-wrapper">
                            <input type="text" class="input-field" placeholder="" readonly
                                aria-labelledby="address-input-label-default">
                        </div>
                        <button type="button" class="btn-postcode-search">
                            우편번호 검색
                        </button>
                    </div>
                    <!-- Main Address Input -->
                    <div class="input-field-wrapper address-main-field-wrapper">
                        <input type="text" class="input-field" placeholder=""
                            aria-labelledby="address-input-label-default">
                    </div>
                    <!-- Detailed Address Input -->
                    <div class="input-field-wrapper address-detailed-field-wrapper">
                        <input type="text" class="input-field" placeholder="상세주소를 입력해 주세요. (ex. A동 1508호)"
                            aria-labelledby="address-input-label-default">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="../assets/js/lib/jquery-4.0.0.js"></script>
    <script src="../assets/js/com/input.js"></script>
</body>

</html>
