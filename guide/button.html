<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width" />
    <title>Button Component</title>
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/guide/guide.css" />
</head>

<body>
    <div class="guide-container">
        <div class="guide-item">
            <h3>Primary Buttons</h3>
            <button type="button" class="btn-primary" disabled>버튼명</button>
            <button type="button" class="btn-primary">버튼명</button>
            <button type="button" class="btn-secondary">버튼명</button>
        </div>
        <div class="guide-item">
            <h3>Popup Buttons</h3>
            <button type="button" class="btn-primary btn-size-popup">버튼명</button>
            <button type="button" class="btn-secondary btn-size-popup btn-popup-sub">버튼명</button>
        </div>
        <div class="guide-item">
            <h3>Download Buttons</h3>
            <button type="button" class="btn-secondary btn-icon btn-size-small">
                <span class="btn-icon-download"></span>
                <span class="btn-icon__text">PDF 다운로드 (검토용,워터마크 노출)</span>
            </button>
            <button type="button" class="btn-primary btn-icon btn-size-small">
                <span class="btn-icon-download"></span>
                <span class="btn-icon__text">상기 계약서 내용을 모두 확인했습니다.</span>
            </button>

        </div>
        <div class="guide-item">
            <h3>Postcode Search Buttons</h3>
            <div style="position: relative">
                <button type="button" class="btn-postcode-search">
                    우편번호 검색
                </button>
            </div>
        </div>
        <div class="guide-item">
            <h3>Edit Action Buttons</h3>
            <button type="button" class="btn-edit-action btn-edit-action-reset">
                <span class="btn-edit-action-icon"></span>
                초기화
            </button>
            <button type="button" class="btn-edit-action btn-edit-action-trash">
                <span class="btn-edit-action-icon"></span>
                파일삭제
            </button>
        </div>
        <div class="guide-item">
            <h3>File Select Buttons</h3>
            <button type="button" class="btn-file-select">
                파일 선택
            </button>
        </div>
        <div class="guide-item">
            <h3>Main Buttons</h3>
            <a href="#" class="agreement-start-block">
                <div class="agreement-start-block__content-wrapper">
                    <div class="agreement-start-block__left-content">
                        <div class="agreement-start-block__button-container">
                            <p class="agreement-start-block__button-text">전자약정 시작하기</p>
                        </div>
                        <p class="agreement-start-block__description">계약 주요 내용을 확인한 후 전자약정서 열람 및 서명이 진행됩니다.</p>
                    </div>
                    <div class="agreement-start-block__arrow-wrapper">
                        <div class="agreement-start-block__arrow-icon"></div>
                    </div>
                </div>
            </a>
        </div>
        <div class="guide-item">
            <h3>Option Buttons</h3>
            <button type="button" class="btn-option">
                버튼명
            </button>
            <button type="button" class="btn-option is-selected">
                버튼명
            </button>
        </div>
    </div>
    <script src="../assets/js/lib/jquery-4.0.0.js"></script>
    <script src="../assets/js/com/button.js"></script>
</body>

</html>
