<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORIX CRTF Main</title>
    <link rel="stylesheet" href="../assets/css/com/common.css" />
    <link rel="stylesheet" href="../assets/css/com/button.css" />
    <link rel="stylesheet" href="../assets/css/page/main.css" />
</head>
<body>
    <div class="header-wrap">
        <div class="nav-container">
            <h1 class="logo">
                <a href="#"><img src="../assets/images/logo.png" alt="ORIX Capital" /></a>
            </h1>
            <div class="links-container">
                <a href="#" class="nav-link">자주 묻는 질문</a>
                <div class="vertical-divider"></div>
                <div class="contact-info">
                    <span class="contact-text">고객센터</span>
                    <div class="phone-info">
                        <span class="phone-icon"></span>
                        <span class="phone-number">02-2050-6700</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-visual-section">
        <div class="background-overlay"></div>
        <div class="text-container">
            <div class="subtitle-container">
                <p class="subtitle">
                    <span class="subtitle-eng">Trust built into every signature.</span>
                    <span class="subtitle-orix"> ORIX</span>
                </p>
                <p class="main-subtitle">계약 확인부터 서명까지, 안전하게 오릭스 전자약정</p>
            </div>
            <p class="main-title">
                <span class="main-title-text">전자약정</span>
                <span class="main-title-bracket">[ </span>
                <span class="main-title-emphasis">방문없이</span>
                <span class="main-title-bracket"> ] </span>
                <span class="main-title-text">완료하다</span>
            </p>
        </div>
    </div>

    <a href="#" class="agreement-start-block">
        <div class="agreement-start-block__content-wrapper">
            <div class="agreement-start-block__left-content">
                <div class="agreement-start-block__button-container">
                    <p class="agreement-start-block__button-text">전자약정 시작하기</p>
                </div>
                <p class="agreement-start-block__description">계약 주요 내용을 확인한 후 전자약정서 열람 및 서명이 진행됩니다.</p>
            </div>
            <div class="agreement-start-block__arrow-wrapper">
                <div class="agreement-start-block__arrow-icon"></div>
            </div>
        </div>
    </a>

    <script src="../assets/js/lib/jquery-1.12.4.min.js"></script>
</body>
</html>
