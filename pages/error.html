<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 장애</title>
    <link rel="stylesheet" href="../assets/css/com/common.css" />
    <link rel="stylesheet" href="../assets/css/com/header.css" />
    <link rel="stylesheet" href="../assets/css/page/error.css" />
</head>

<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <img src="../../assets/images/orix_logo.png" alt="ORIX Capital" />
            </h1>
            <div class="contact-info">
                <p class="contact-text">고객센터</p>
                <div class="phone-info">
                    <span class="icon phone-icon">
                        <img src="../../assets/images/phone-icon-header.svg" alt="Phone" />
                    </span>
                    <p class="phone-number">02-2050-6700</p>
                </div>
            </div>
        </div>
    </header>

    <div class="main-error-container">
        <div class="image-container">
            <img src="../assets/images/caution.png" alt="Caution" />
        </div>
        <div class="content-container">
            <p class="error-title">
                <span class="error-title-red">서비스장애</span>가 발생하였습니다.
            </p>
            <div class="detail-text-container">
                <div class="detail-text">
                    <p>URL 유효기간이 만료되었습니다.</p>
                    <p>오릭스캐피탈 고객센터 또는 담당자에게 연락해주세요.</p>
                </div>
            </div>
        </div>
    </div>

</html>
