<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>본인인증</title>
    <link rel="stylesheet" href="../assets/css/com/reset.css" />
    <link rel="stylesheet" href="../assets/css/com/common.css" />
    <link rel="stylesheet" href="../assets/css/com/button.css" />
    <link rel="stylesheet" href="../assets/css/com/input.css" />
    <link rel="stylesheet" href="../assets/css/com/toggle.css" />
    <link rel="stylesheet" href="../assets/css/com/header.css" />
    <link rel="stylesheet" href="../assets/css/page/form.css" />
</head>

<body>
    <div class="page-content-wrapper">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <img src="../../assets/images/orix_logo.png" alt="ORIX Capital" />
                </h1>
                <div class="contact-info">
                    <p class="contact-text">고객센터</p>
                    <div class="phone-info">
                        <span class="icon phone-icon">
                            <img src="../../assets/images/phone-icon-header.svg" alt="Phone" />
                        </span>
                        <p class="phone-number">02-2050-6700</p>
                    </div>
                </div>
            </div>
        </header>

        <h2 class="page-title">본인인증</h2>

        <div class="main-content-area">
            <div class="form-section">
                <div class="form-card">
                    <div class="terms-agreement-container">
                        <div class="check-line terms-all-agree">
                            <div class="checkbox">
                                <input type="checkbox" id="terms-all" class="sr-only" />
                                <label for="terms-all" class="checkbox-label"></label>
                            </div>
                            <p class="terms-title">전체 약관동의</p>
                        </div>
                        <div class="divider"></div>

                        <div class="agreement-item">
                            <div class="check-line">
                                <div class="checkbox">
                                    <input type="checkbox" id="terms-personal" class="sr-only" />
                                    <label for="terms-personal" class="checkbox-label"></label>
                                </div>
                                <div class="agreement-text">
                                    <p><span class="required">(필수)</span> 개인정보 수집・이용 동의</p>
                                </div>
                                <button type="button" class="btn-arrow-down"></button>
                            </div>
                            <div class="divider"></div>
                        </div>

                        <div class="agreement-item">
                            <div class="check-line">
                                <div class="checkbox">
                                    <input type="checkbox" id="terms-unique" class="sr-only" />
                                    <label for="terms-unique" class="checkbox-label"></label>
                                </div>
                                <div class="agreement-text">
                                    <p><span class="required">(필수)</span> 고유식별정보처리동의</p>
                                </div>
                                <button type="button" class="btn-arrow-down"></button>
                            </div>
                            <div class="divider"></div>
                        </div>

                        <div class="agreement-item">
                            <div class="check-line">
                                <div class="checkbox">
                                    <input type="checkbox" id="terms-telecom" class="sr-only" />
                                    <label for="terms-telecom" class="checkbox-label"></label>
                                </div>
                                <div class="agreement-text">
                                    <p><span class="required">(필수)</span> 통신사 이용약관 동의</p>
                                </div>
                                <button type="button" class="btn-arrow-down"></button>
                            </div>
                            <div class="divider"></div>
                        </div>

                        <div class="agreement-item">
                            <div class="check-line">
                                <div class="checkbox">
                                    <input type="checkbox" id="terms-service" class="sr-only" />
                                    <label for="terms-service" class="checkbox-label"></label>
                                </div>
                                <div class="agreement-text">
                                    <p><span class="required">(필수)</span> 서비스 이용약관 동의</p>
                                </div>
                                <button type="button" class="btn-arrow-down"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-card-group">
                    <div class="form-card">
                        <p class="card-title">안내문 수신 정보</p>
                        <div class="input-group-wrapper">
                            <p class="input-label">이메일</p>
                            <div class="input-email-group">
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" placeholder="이메일을 입력해 주세요." />
                                </div>
                                <span class="at-symbol">@</span>
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" value="naver.com" />
                                </div>
                            </div>
                        </div>

                        <div class="input-group-wrapper">
                            <p class="input-label">담당자 연락처</p>
                            <div class="input-phone-group">
                                <div class="select-box">
                                    <select class="select-phone-prefix">
                                        <option>선택</option>
                                    </select>
                                    <span class="icon-arrow-down"></span>
                                </div>
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" />
                                </div>
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-card">
                        <p class="card-title">법인 등록 주소지</p>
                        <div class="input-group-wrapper">
                            <p class="input-label">주소</p>
                            <div class="input-address-group">
                                <div class="input-with-button">
                                    <div class="input-text-wrap">
                                        <input type="text" class="input-text" />
                                    </div>
                                    <button type="button" class="btn-postcode-search">우편번호 검색</button>
                                </div>
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" />
                                </div>
                                <div class="input-text-wrap">
                                    <input type="text" class="input-text" placeholder="상세주소를 입력해 주세요. (ex. A동 1508호)" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="footer-wrap">
                <div class="footer-content">
                    <div class="footer-text-container">
                        <p class="footer-message">약정완료 시, 계약서류 및 안내가 입력하신 정보로 발송됩니다.</p>
                        <div class="footer-disclaimer-container">
                            <p class="footer-disclaimer-prefix">※</p>
                            <p class="footer-disclaimer-text">정확한 법인 정보를 입력해주시기 바랍니다.</p>
                        </div>
                    </div>
                    <button type="button" class="btn-primary btn-footer-action">법인공동인증서 인증하기</button>
                </div>
            </div>
        </div>

        <script src="../assets/js/lib/jquery-1.12.4.min.js"></script>
        <script src="../assets/js/ui/com/ui-util.js"></script>
        <script src="../assets/js/ui/com/button.js"></script>
        <script src="../assets/js/ui/com/input.js"></script>
        <script src="../assets/js/ui/com/toggle.js"></script>
</body>

</html>
