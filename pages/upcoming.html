<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 오픈 준비중</title>
    <link rel="stylesheet" href="../assets/css/com/common.css" />
    <link rel="stylesheet" href="../assets/css/com/button.css" />
    <link rel="stylesheet" href="../assets/css/page/upcoming.css" />
</head>
<body>
    <div class="header-wrap">
        <div class="header-content">
            <h1 class="logo">
                <a href="#"><img src="../assets/images/orix_logo.png" alt="ORIX Capital" /></a>
            </h1>
            <div class="contact-info">
                <p class="contact-text">고객센터</p>
                <div class="phone-info">
                    <span class="phone-icon"></span>
                    <span class="phone-number">02-2050-6700</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-upcoming-container">
        <div class="image-container">
            <img src="../assets/images/ing.png" alt="Service Processing" />
        </div>
        <div class="content-container">
            <p class="upcoming-title">
                서비스 오픈 준비중
            </p>
            <div class="detail-text-container">
                <div class="detail-text">
                    <p>이용에 불편을 드려 죄송합니다. 해당 메뉴는 현재 오픈 준비중이며, </p>
                    <p>곧 정상 서비스될 예정입니다.</p>
                </div>
            </div>
        </div>
        <button type="button" class="btn-primary btn-upcoming-lg">
            처음으로 이동
        </button>
    </div>
